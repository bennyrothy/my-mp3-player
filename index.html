<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ben's MP3 Player</title>

  <style>
    body {
      font-family: Arial;
      background: url("https://live.staticflickr.com/4765/25940868748_9247e7660c_b.jpg") 
                  no-repeat center center fixed;
      background-size: cover;
      color: #eee;
      padding: 20px;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.45);
      pointer-events: none;
      z-index: -1;
    }

    .track {
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.4);
      transition: 0.15s;
    }

    .track:hover {
      background: rgba(0,0,0,0.55);
      box-shadow: 0 0 10px rgba(255,255,255,0.3);
      transform: scale(1.02);
    }

    .active {
      background: rgba(0,0,0,0.75);
      box-shadow: 0 0 15px rgba(0,255,150,0.6);
      border-left: 4px solid #00ff99;
      transform: scale(1.02);
    }

    #shuffle-btn.active {
      background-color: #4caf50;
      color: #fff;
    }

    .new-badge {
      color: #ff4444;
      font-weight: bold;
    }

    .latest-badge {
      color: #00ff99;
      font-weight: 900;
      text-shadow: 0 0 6px #00ff99;
    }

    .skip-btn {
      margin-right: 10px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Ben's MP3 Player</h2>

<button id="shuffle-btn" onclick="toggleShuffle()">Shuffle</button>

<button class="skip-btn" onclick="skipBack()">⏪ -30s</button>
<button class="skip-btn" onclick="skipForward()">⏩ +30s</button>

    { title: "Amazing Grace 6-8", url: "music/Amazing Grace 6-8.mp3" },
    { title: "Amazing Grace 1", url: "music/Amazing Grace 1.mp3" }
  ];

  const playlistDiv = document.getElementById("playlist");
  const player = document.getElementById("player");

  let currentIndex = 0;
  let shuffleEnabled = false;
  let shuffleQueue = [];

  function reshuffle() {
    shuffleQueue = Array.from({ length: tracks.length }, (_, i) => i);
    shuffleQueue = shuffleQueue.filter(i => i !== currentIndex);
    shuffleQueue.sort(() => Math.random() - 0.5);
  }

  function toggleShuffle() {
    if (!shuffleEnabled) {
      shuffleEnabled = true;
      document.getElementById("shuffle-btn").classList.add("active");
      reshuffle();
      playTrack(shuffleQueue.shift());
    } else {
      shuffleEnabled = false;
      document.getElementById("shuffle-btn").classList.remove("active");
    }
  }

  tracks.forEach((track, index) => {
    const div = document.createElement("div");
    div.className = "track";

    const titleSpan = document.createElement("span");
    titleSpan.textContent = track.title;
    div.appendChild(titleSpan);

    if (track.isNew) {
      const badge = document.createElement("span");
      badge.className = "new-badge";
      badge.textContent = "NEW";
      div.appendChild(badge);
    }

    if (track.isLatest) {
      const badge = document.createElement("span");
      badge.className = "latest-badge";
      badge.textContent = "LATEST";
      div.appendChild(badge);
    }

    div.onclick = () => playTrack(index);
    playlistDiv.appendChild(div);
  });

  function playTrack(index) {
    currentIndex = index;
    player.src = tracks[index].url;
    player.play();

    document.querySelectorAll(".track").forEach(t => t.classList.remove("active"));
    playlistDiv.children[index].classList.add("active");
  }

  function skipBack() {
    player.currentTime = Math.max(0, player.currentTime - 30);
  }

  function skipForward() {
    player.currentTime = Math.min(player.duration, player.currentTime + 30);
  }

  player.addEventListener("ended", () => {
    if (shuffleEnabled) {
      if (shuffleQueue.length === 0) reshuffle();
      playTrack(shuffleQueue.shift());
    }
  });
</script>
