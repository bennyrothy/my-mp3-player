<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ben's MP3 Player</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background-image: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1920&q=80");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 20px;
        font-size: 32px;
        text-shadow: 0 0 10px black;
    }

    #player-box {
        background: rgba(0, 0, 0, 0.6);
        padding: 20px;
        border-radius: 15px;
        width: 90%;
        max-width: 600px;
        margin: 20px auto;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }

    #now-playing {
        font-size: 20px;
        margin-bottom: 10px;
        font-weight: bold;
        text-shadow: 0 0 8px black;
    }

    audio {
        width: 100%;
        margin-top: 10px;
    }

    #playlist {
        margin-top: 20px;
        text-align: left;
        max-height: 60vh;
        overflow-y: auto;
        padding-right: 10px;
    }

    .track {
        padding: 10px;
        margin: 5px 0;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
        font-size: 18px;
    }

    .track:hover {
        background: rgba(255, 255, 255, 0.15);
    }

    .active {
        background: rgba(255, 255, 255, 0.25);
        font-weight: bold;
        border-left: 4px solid #00ffcc;
    }
</style>
</head>
<body>

<h1>Ben's MP3 Player</h1>

<div id="player-box">
    <div id="now-playing">Now Playing: None</div>
    <audio id="audioPlayer" controls></audio>

const audioPlayer = document.getElementById("audioPlayer");
const playlistDiv = document.getElementById("playlist");
const nowPlaying = document.getElementById("now-playing");

function loadPlaylist() {
    playlist.forEach((track, index) => {
        const div = document.createElement("div");
        div.classList.add("track");
        div.textContent = track.title;
        div.onclick = () => playTrack(index);
        playlistDiv.appendChild(div);
    });
}

function playTrack(index) {
    const track = playlist[index];
    audioPlayer.src = track.src;
    audioPlayer.play();

    nowPlaying.textContent = "Now Playing: " + track.title;

    document.querySelectorAll(".track").forEach(t => t.classList.remove("active"));
    playlistDiv.children[index].classList.add("active");
}

loadPlaylist();
</script>
